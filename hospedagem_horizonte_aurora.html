
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .app { min-height: 100vh; background: var(--color-background-tertiary); }
  .header { background: var(--color-background-primary); border-bottom: 0.5px solid var(--color-border-tertiary); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .logo { font-size: 17px; font-weight: 500; color: var(--color-text-primary); }
  .logo span { color: #1D9E75; }
  .nav { display: flex; gap: 4px; }
  .nav-btn { background: none; border: none; cursor: pointer; padding: 8px 14px; border-radius: var(--border-radius-md); font-size: 14px; color: var(--color-text-secondary); transition: all .15s; }
  .nav-btn.active, .nav-btn:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
  .content { padding: 24px; max-width: 1100px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 16px; }
  .metric-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
  .metric-value { font-size: 28px; font-weight: 500; color: var(--color-text-primary); }
  .metric-sub { font-size: 12px; color: var(--color-text-tertiary); margin-top: 2px; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 20px; margin-bottom: 20px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .btn { border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); padding: 8px 16px; border-radius: var(--border-radius-md); cursor: pointer; font-size: 13px; transition: all .15s; }
  .btn:hover { background: var(--color-background-secondary); }
  .btn-primary { background: #1D9E75; border-color: #1D9E75; color: #fff; }
  .btn-primary:hover { background: #0F6E56; border-color: #0F6E56; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-danger { background: none; border-color: #A32D2D; color: #A32D2D; }
  .btn-danger:hover { background: #FCEBEB; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; color: var(--color-text-secondary); font-weight: 500; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  td { padding: 10px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--color-background-secondary); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-green { background: #EAF3DE; color: #3B6D11; }
  .badge-blue { background: #E6F1FB; color: #185FA5; }
  .badge-amber { background: #FAEEDA; color: #854F0B; }
  .badge-red { background: #FCEBEB; color: #A32D2D; }
  .badge-gray { background: var(--color-background-secondary); color: var(--color-text-secondary); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--color-background-primary); border-radius: var(--border-radius-lg); padding: 24px; width: 480px; max-width: 95vw; max-height: 85vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; }
  .cal-day-name { text-align: center; font-size: 11px; color: var(--color-text-secondary); font-weight: 500; padding: 4px; }
  .cal-day { min-height: 80px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 6px; background: var(--color-background-primary); }
  .cal-day.other-month { background: var(--color-background-secondary); opacity: .5; }
  .cal-day.today { border-color: #1D9E75; }
  .cal-day-num { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .cal-day.today .cal-day-num { color: #1D9E75; font-weight: 500; }
  .cal-event { font-size: 10px; background: #E1F5EE; color: #0F6E56; padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  .cal-event.checkout { background: #FAEEDA; color: #854F0B; }
  .cal-event.stay { background: #E6F1FB; color: #185FA5; }
  .cal-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .cal-nav h3 { font-size: 15px; font-weight: 500; flex: 1; text-align: center; }
  .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .room-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px; }
  .room-num { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .room-type { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
  .room-price { font-size: 13px; color: var(--color-text-primary); margin-bottom: 10px; }
  .divider { height: 0.5px; background: var(--color-border-tertiary); margin: 16px 0; }
  .empty { text-align: center; padding: 40px; color: var(--color-text-tertiary); font-size: 14px; }
</style>

<div class="app">
  <div class="header">
    <div class="logo">Hospedagem <span>Horizonte</span> · Aurora/TO</div>
    <div class="nav">
      <button class="nav-btn active" onclick="showSection('painel')"><i class="ti ti-layout-dashboard" aria-hidden="true"></i> Painel</button>
      <button class="nav-btn" onclick="showSection('reservas')"><i class="ti ti-calendar-check" aria-hidden="true"></i> Reservas</button>
      <button class="nav-btn" onclick="showSection('calendario')"><i class="ti ti-calendar" aria-hidden="true"></i> Calendário</button>
      <button class="nav-btn" onclick="showSection('quartos')"><i class="ti ti-door" aria-hidden="true"></i> Quartos</button>
    </div>
  </div>
  <div class="content">

    <!-- PAINEL -->
    <div class="section active" id="sec-painel">
      <div class="metrics" id="metrics"></div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">Atividade recente</span>
          <button class="btn btn-primary btn-sm" onclick="openModal()"><i class="ti ti-plus" aria-hidden="true"></i> Nova reserva</button>
        </div>
        <table id="painel-table">
          <thead><tr><th>Hóspede</th><th>Quarto</th><th>Check-in</th><th>Check-out</th><th>Status</th></tr></thead>
          <tbody id="painel-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- RESERVAS -->
    <div class="section" id="sec-reservas">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Todas as reservas</span>
          <button class="btn btn-primary btn-sm" onclick="openModal()"><i class="ti ti-plus" aria-hidden="true"></i> Nova reserva</button>
        </div>
        <table>
          <thead><tr><th>Hóspede</th><th>Quarto</th><th>Check-in</th><th>Check-out</th><th>Diárias</th><th>Valor</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody id="reservas-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- CALENDÁRIO -->
    <div class="section" id="sec-calendario">
      <div class="card">
        <div class="cal-nav">
          <button class="btn btn-sm" onclick="changeMonth(-1)"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
          <h3 id="cal-month-label"></h3>
          <button class="btn btn-sm" onclick="changeMonth(1)"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
        </div>
        <div class="cal-header">
          <div class="cal-day-name">Dom</div><div class="cal-day-name">Seg</div><div class="cal-day-name">Ter</div>
          <div class="cal-day-name">Qua</div><div class="cal-day-name">Qui</div><div class="cal-day-name">Sex</div><div class="cal-day-name">Sáb</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div style="display:flex;gap:12px;margin-top:12px;font-size:12px;color:var(--color-text-secondary);">
          <span><span style="display:inline-block;width:10px;height:10px;background:#E1F5EE;border-radius:2px;margin-right:4px;"></span>Check-in</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#E6F1FB;border-radius:2px;margin-right:4px;"></span>Hospedado</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#FAEEDA;border-radius:2px;margin-right:4px;"></span>Check-out</span>
        </div>
      </div>
    </div>

    <!-- QUARTOS -->
    <div class="section" id="sec-quartos">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Quartos</span>
          <button class="btn btn-sm" onclick="openRoomModal()"><i class="ti ti-plus" aria-hidden="true"></i> Novo quarto</button>
        </div>
        <div class="rooms-grid" id="rooms-grid"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL NOVA RESERVA -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Nova reserva</h3>
    <div class="form-group">
      <label>Nome do hóspede</label>
      <input type="text" id="f-nome" placeholder="Nome completo">
    </div>
    <div class="form-group">
      <label>Telefone</label>
      <input type="text" id="f-tel" placeholder="(00) 00000-0000">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Check-in</label>
        <input type="date" id="f-checkin">
      </div>
      <div class="form-group">
        <label>Check-out</label>
        <input type="date" id="f-checkout">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Quarto</label>
        <select id="f-quarto"></select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="Confirmada">Confirmada</option>
          <option value="Hospedado">Hospedado</option>
          <option value="Finalizada">Finalizada</option>
          <option value="Cancelada">Cancelada</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Observações</label>
      <textarea id="f-obs" rows="2" placeholder="Pedidos especiais, etc."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveReserva()">Salvar reserva</button>
    </div>
  </div>
</div>

<!-- MODAL NOVO QUARTO -->
<div class="modal-overlay" id="room-modal">
  <div class="modal">
    <h3>Novo quarto</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Número</label>
        <input type="text" id="r-num" placeholder="Ex: 101">
      </div>
      <div class="form-group">
        <label>Tipo</label>
        <select id="r-tipo">
          <option>Solteiro</option><option>Duplo</option><option>Casal</option><option>Suite</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Diária (R$)</label>
        <input type="number" id="r-preco" placeholder="120">
      </div>
      <div class="form-group">
        <label>Capacidade</label>
        <input type="number" id="r-cap" placeholder="2" min="1" max="6">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeRoomModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRoom()">Salvar quarto</button>
    </div>
  </div>
</div>

<script>
const today = new Date();
const todayStr = today.toISOString().slice(0,10);

let rooms = [
  { id:1, num:'101', tipo:'Solteiro', preco:80, cap:1 },
  { id:2, num:'102', tipo:'Duplo', preco:120, cap:2 },
  { id:3, num:'103', tipo:'Casal', preco:130, cap:2 },
  { id:4, num:'104', tipo:'Suite', preco:200, cap:4 },
  { id:5, num:'201', tipo:'Solteiro', preco:80, cap:1 },
  { id:6, num:'202', tipo:'Duplo', preco:120, cap:2 },
  { id:7, num:'203', tipo:'Casal', preco:130, cap:2 },
  { id:8, num:'204', tipo:'Suite', preco:200, cap:4 },
];

let reservas = [
  { id:1, nome:'Juliana Costa', tel:'(63) 99999-0001', checkin:'2026-05-21', checkout:'2026-05-26', quartoId:1, status:'Finalizada', obs:'' },
  { id:2, nome:'Roberto Farias', tel:'(63) 99999-0002', checkin:'2026-05-28', checkout:'2026-05-31', quartoId:4, status:'Confirmada', obs:'Quer quarto no andar de cima' },
  { id:3, nome:'Ana Beatriz Lima', tel:'(63) 99999-0003', checkin:'2026-05-30', checkout:'2026-05-30', quartoId:6, status:'Confirmada', obs:'' },
  { id:4, nome:'Carlos Mendes', tel:'(63) 99999-0004', checkin:'2026-05-24', checkout:'2026-05-27', quartoId:2, status:'Hospedado', obs:'Viagem de negócios' },
];

let editId = null;
let calMonth = today.getMonth();
let calYear = today.getFullYear();
let nextId = 5;

function getRoom(id) { return rooms.find(r => r.id === id) || {}; }

function nights(ci, co) {
  const d = (new Date(co) - new Date(ci)) / 86400000;
  return d > 0 ? d : 1;
}

function statusBadge(s) {
  const map = { 'Confirmada':'blue','Hospedado':'green','Finalizada':'gray','Cancelada':'red' };
  return `<span class="badge badge-${map[s]||'gray'}">${s}</span>`;
}

function renderPainel() {
  const hospedados = reservas.filter(r => r.status === 'Hospedado').length;
  const checkins = reservas.filter(r => r.checkin === todayStr && r.status !== 'Cancelada').length;
  const checkouts = reservas.filter(r => r.checkout === todayStr && r.status !== 'Cancelada').length;
  const ocupados = new Set(reservas.filter(r => r.status === 'Hospedado').map(r => r.quartoId));
  const livres = rooms.length - ocupados.size;
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Hóspedes hoje</div><div class="metric-value">${hospedados}</div><div class="metric-sub">hospedados</div></div>
    <div class="metric"><div class="metric-label">Check-ins hoje</div><div class="metric-value">${checkins}</div><div class="metric-sub">chegadas esperadas</div></div>
    <div class="metric"><div class="metric-label">Check-outs hoje</div><div class="metric-value">${checkouts}</div><div class="metric-sub">saídas previstas</div></div>
    <div class="metric"><div class="metric-label">Quartos livres</div><div class="metric-value">${livres}</div><div class="metric-sub">disponíveis</div></div>
  `;
  const recent = [...reservas].sort((a,b) => b.id - a.id).slice(0, 8);
  document.getElementById('painel-tbody').innerHTML = recent.map(r => {
    const rm = getRoom(r.quartoId);
    return `<tr><td>${r.nome}</td><td>${rm.num||'—'}</td><td>${r.checkin}</td><td>${r.checkout}</td><td>${statusBadge(r.status)}</td></tr>`;
  }).join('');
}

function renderReservas() {
  document.getElementById('reservas-tbody').innerHTML = reservas.map(r => {
    const rm = getRoom(r.quartoId);
    const n = nights(r.checkin, r.checkout);
    const valor = (rm.preco||0) * n;
    return `<tr>
      <td><strong>${r.nome}</strong><br><span style="font-size:11px;color:var(--color-text-secondary)">${r.tel}</span></td>
      <td>${rm.num||'—'} <span style="font-size:11px;color:var(--color-text-secondary)">${rm.tipo||''}</span></td>
      <td>${r.checkin}</td>
      <td>${r.checkout}</td>
      <td>${n} noite${n>1?'s':''}</td>
      <td>R$ ${valor.toLocaleString('pt-BR')}</td>
      <td>${statusBadge(r.status)}</td>
      <td>
        <button class="btn btn-sm" onclick="editReserva(${r.id})" title="Editar"><i class="ti ti-edit" aria-hidden="true"></i></button>
        <button class="btn btn-sm btn-danger" onclick="deleteReserva(${r.id})" title="Excluir"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </td>
    </tr>`;
  }).join('') || `<tr><td colspan="8" class="empty">Nenhuma reserva cadastrada.</td></tr>`;
}

function renderCalendario() {
  const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('cal-month-label').textContent = `${months[calMonth]} ${calYear}`;
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  let html = '';
  let day = 1 - firstDay;
  for (let i = 0; i < 42; i++) {
    const date = new Date(calYear, calMonth, day);
    const ds = date.toISOString().slice(0,10);
    const isCurrentMonth = date.getMonth() === calMonth;
    const isToday = ds === todayStr;
    let evts = '';
    reservas.filter(r => r.status !== 'Cancelada').forEach(r => {
      if (r.checkin === ds) evts += `<div class="cal-event" title="${r.nome} · Quarto ${getRoom(r.quartoId).num||'?'}">${r.nome.split(' ')[0]} (Qto ${getRoom(r.quartoId).num||'?'})</div>`;
      else if (r.checkout === ds) evts += `<div class="cal-event checkout" title="Saída: ${r.nome}">${r.nome.split(' ')[0]} (saída)</div>`;
      else if (ds > r.checkin && ds < r.checkout) evts += `<div class="cal-event stay" title="${r.nome}">${r.nome.split(' ')[0]}</div>`;
    });
    html += `<div class="cal-day${!isCurrentMonth?' other-month':''}${isToday?' today':''}"><div class="cal-day-num">${date.getDate()}</div>${evts}</div>`;
    day++;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function renderRooms() {
  const ocupados = new Set(reservas.filter(r => r.status === 'Hospedado').map(r => r.quartoId));
  document.getElementById('rooms-grid').innerHTML = rooms.map(r => {
    const occ = ocupados.has(r.id);
    return `<div class="room-card">
      <div class="room-num">Qto ${r.num}</div>
      <div class="room-type">${r.tipo} · ${r.cap} pessoa${r.cap>1?'s':''}</div>
      <div class="room-price">R$ ${r.preco}/noite</div>
      <span class="badge ${occ?'badge-amber':'badge-green'}">${occ?'Ocupado':'Disponível'}</span>
    </div>`;
  }).join('');
}

function renderAll() {
  renderPainel(); renderReservas(); renderCalendario(); renderRooms();
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  event.currentTarget.classList.add('active');
  if (id === 'calendario') renderCalendario();
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendario();
}

function openModal(id) {
  editId = id || null;
  const sel = document.getElementById('f-quarto');
  sel.innerHTML = rooms.map(r => `<option value="${r.id}">Qto ${r.num} — ${r.tipo}</option>`).join('');
  if (id) {
    const r = reservas.find(x => x.id === id);
    document.getElementById('modal-title').textContent = 'Editar reserva';
    document.getElementById('f-nome').value = r.nome;
    document.getElementById('f-tel').value = r.tel;
    document.getElementById('f-checkin').value = r.checkin;
    document.getElementById('f-checkout').value = r.checkout;
    document.getElementById('f-quarto').value = r.quartoId;
    document.getElementById('f-status').value = r.status;
    document.getElementById('f-obs').value = r.obs;
  } else {
    document.getElementById('modal-title').textContent = 'Nova reserva';
    document.getElementById('f-nome').value = '';
    document.getElementById('f-tel').value = '';
    document.getElementById('f-checkin').value = todayStr;
    document.getElementById('f-checkout').value = '';
    document.getElementById('f-quarto').value = rooms[0]?.id || 1;
    document.getElementById('f-status').value = 'Confirmada';
    document.getElementById('f-obs').value = '';
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveReserva() {
  const nome = document.getElementById('f-nome').value.trim();
  const ci = document.getElementById('f-checkin').value;
  const co = document.getElementById('f-checkout').value;
  if (!nome || !ci || !co) { alert('Preencha nome, check-in e check-out.'); return; }
  if (ci > co) { alert('Check-out deve ser após check-in.'); return; }
  const obj = {
    id: editId || nextId++,
    nome, tel: document.getElementById('f-tel').value,
    checkin: ci, checkout: co,
    quartoId: parseInt(document.getElementById('f-quarto').value),
    status: document.getElementById('f-status').value,
    obs: document.getElementById('f-obs').value,
  };
  if (editId) {
    const idx = reservas.findIndex(r => r.id === editId);
    reservas[idx] = obj;
  } else {
    reservas.unshift(obj);
  }
  closeModal(); renderAll();
}

function editReserva(id) { openModal(id); }

function deleteReserva(id) {
  if (confirm('Excluir esta reserva?')) {
    reservas = reservas.filter(r => r.id !== id);
    renderAll();
  }
}

function openRoomModal() { document.getElementById('room-modal').classList.add('open'); }
function closeRoomModal() { document.getElementById('room-modal').classList.remove('open'); }

function saveRoom() {
  const num = document.getElementById('r-num').value.trim();
  const preco = parseInt(document.getElementById('r-preco').value) || 0;
  if (!num) { alert('Informe o número do quarto.'); return; }
  rooms.push({ id: Date.now(), num, tipo: document.getElementById('r-tipo').value, preco, cap: parseInt(document.getElementById('r-cap').value)||2 });
  closeRoomModal(); renderAll();
  document.getElementById('r-num').value = ''; document.getElementById('r-preco').value = ''; document.getElementById('r-cap').value = '';
}

document.getElementById('modal').addEventListener('click', e => { if(e.target === document.getElementById('modal')) closeModal(); });
document.getElementById('room-modal').addEventListener('click', e => { if(e.target === document.getElementById('room-modal')) closeRoomModal(); });

renderAll();
</script>
